name: poly_shadow
description: Poly-Shadow — Polymarket trading agent Flutter dashboard.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  dio: ^5.6.0
  go_router: ^17.2.0
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  get_it: ^9.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12    # required for get_it generators & json_serializable

flutter:
  uses-material-design: true
  assets:
    - assets/images/
