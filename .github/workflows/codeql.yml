# CodeQL — Security analysis for Python agent
# Critical for a trading app: catches injection risks, insecure patterns,
# hardcoded secrets, and unsafe API usage before they reach production.

name: CodeQL Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Runs every Monday at 08:00 UTC — catches new CVEs in dependencies
    - cron: '0 8 * * 1'

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:python'
